<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service CRM - Combined Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #334155;
        }

        .tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #e2e8f0;
        }

        .tab.active {
            color: #60a5fa;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-complete {
            background: #059669;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-complete:hover {
            background: #047857;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .filter-btns {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.75rem 1.25rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .customers-grid {
            display: grid;
            gap: 1.5rem;
        }

        .customer-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .customer-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .customer-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .customer-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .customer-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .status-completed {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }

        .customer-actions {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .icon-btn {
            padding: 0.5rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.375rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: #3b82f6;
            border-color: #3b82f6;
        }

        .customer-details {
            display: grid;
            gap: 0.75rem;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            color: #cbd5e1;
            font-size: 0.875rem;
        }

        .detail-icon {
            flex-shrink: 0;
            width: 1.25rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .close-btn:hover {
            color: #e2e8f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .tabs {
                overflow-x: auto;
            }

            .tab {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <div class="logo">✨</div>
            <h1>Service CRM</h1>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Booking</button>
    </div>

    <div class="main">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('carwash')">🚗 Car Wash</button>
            <button class="tab" onclick="switchTab('trashcan')">🗑️ Trash Can Cleaning</button>
        </div>

        <!-- Car Wash Tab -->
        <div id="carwash-tab" class="tab-content active">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Car Wash Bookings</div>
                    <div class="stat-value" id="carwashTotal">0</div>
                </div>
            </div>

            <div class="controls">
                <div class="search-box">
                    <input type="text" id="carwashSearch" placeholder="Search by name, phone..." oninput="filterCustomers('carwash')">
                </div>
                <div class="filter-btns">
                    <button class="filter-btn active" onclick="setFilter('carwash', 'all')">All</button>
                    <button class="filter-btn" onclick="setFilter('carwash', 'active')">Active</button>
                    <button class="filter-btn" onclick="setFilter('carwash', 'completed')">Completed</button>
                </div>
            </div>

            <div class="customers-grid" id="carwashGrid"></div>
        </div>

        <!-- Trash Can Tab -->
        <div id="trashcan-tab" class="tab-content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Trash Can Bookings</div>
                    <div class="stat-value" id="trashcanTotal">0</div>
                </div>
            </div>

            <div class="controls">
                <div class="search-box">
                    <input type="text" id="trashcanSearch" placeholder="Search by name, phone, address..." oninput="filterCustomers('trashcan')">
                </div>
                <div class="filter-btns">
                    <button class="filter-btn active" onclick="setFilter('trashcan', 'all')">All</button>
                    <button class="filter-btn" onclick="setFilter('trashcan', 'active')">Active</button>
                    <button class="filter-btn" onclick="setFilter('trashcan', 'completed')">Completed</button>
                </div>
            </div>

            <div class="customers-grid" id="trashcanGrid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Booking</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="customerForm" onsubmit="saveCustomer(event)">
                <input type="hidden" id="serviceType">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <!-- Car Wash Specific Fields -->
                <div id="carwashFields" style="display:none;">
                    <div class="form-group full-width">
                        <label>Service Location *</label>
                        <select id="location" onchange="toggleAddressField()">
                            <option value="">Select location option</option>
                            <option value="Mobile Service (We come to you)">Mobile Service (We come to you)</option>
                            <option value="Drop off at driveway (House Number 28)">Drop off at driveway (House Number 28)</option>
                        </select>
                    </div>
                    <div class="form-group full-width" id="crmAddressField" style="display: none;">
                        <label>Address</label>
                        <input type="text" id="crmAddress">
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Package *</label>
                            <select id="carwashService">
                                <option value="">Select package</option>
                                <option value="Package A - Interior Detail - $40">Package A - Interior Detail - $40</option>
                                <option value="Package B - Exterior Wash - $40">Package B - Exterior Wash - $40</option>
                                <option value="Package C - Full Service - $70">Package C - Full Service - $70</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Appointment Date & Time *</label>
                            <input type="datetime-local" id="carwashDateTime">
                        </div>
                    </div>
                </div>

                <!-- Trash Can Specific Fields -->
                <div id="trashcanFields" style="display:none;">
                    <div class="form-group full-width">
                        <label>Address *</label>
                        <input type="text" id="trashcanAddress">
                        <small style="color: #94a3b8; font-size: 0.8rem;">We come to you! Mobile service at your location.</small>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Package *</label>
                            <select id="trashcanService">
                                <option value="">Select package</option>
                                <option value="Package A - Single Can - $15">Package A - Single Can - $15</option>
                                <option value="Package B - Two Cans - $25">Package B - Two Cans - $25</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Appointment Date & Time *</label>
                            <input type="datetime-local" id="trashcanDateTime">
                        </div>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Notes</label>
                    <textarea id="notes"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteCustomer()" style="display: none;">Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let carwashCustomers = [];
        let trashcanCustomers = [];
        let currentTab = 'carwash';
        let currentFilter = { carwash: 'all', trashcan: 'all' };
        let editingCustomerId = null;

        function init() {
            loadData();
            renderAll();
        }

        function loadData() {
            carwashCustomers = JSON.parse(localStorage.getItem('carWashBookings') || '[]');
            trashcanCustomers = JSON.parse(localStorage.getItem('trashCanBookings') || '[]');
        }

        function saveData() {
            localStorage.setItem('carWashBookings', JSON.stringify(carwashCustomers));
            localStorage.setItem('trashCanBookings', JSON.stringify(trashcanCustomers));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        function renderAll() {
            renderCustomers('carwash');
            renderCustomers('trashcan');
            updateStats();
        }

        function updateStats() {
            document.getElementById('carwashTotal').textContent = carwashCustomers.length;
            document.getElementById('trashcanTotal').textContent = trashcanCustomers.length;
        }

        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: '2-digit',
                day: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function setFilter(service, filter) {
            currentFilter[service] = filter;
            const buttons = document.querySelector(`#${service}-tab .filter-btns`).querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCustomers(service);
        }

        function filterCustomers(service) {
            renderCustomers(service);
        }

        function toggleAddressField() {
            const location = document.getElementById('location').value;
            const addressField = document.getElementById('crmAddressField');
            const addressInput = document.getElementById('crmAddress');
            
            if (location === 'Mobile Service (We come to you)') {
                addressField.style.display = 'block';
            } else {
                addressField.style.display = 'none';
                addressInput.value = '';
            }
        }

        function markComplete(service, id) {
            const customers = service === 'carwash' ? carwashCustomers : trashcanCustomers;
            const customer = customers.find(c => c.id === id);
            if (customer) {
                customer.status = 'completed';
                saveData();
                renderCustomers(service);
            }
        }

        function renderCustomers(service) {
            const customers = service === 'carwash' ? carwashCustomers : trashcanCustomers;
            const searchTerm = document.getElementById(service + 'Search').value.toLowerCase();
            const grid = document.getElementById(service + 'Grid');
            const filter = currentFilter[service];

            const filtered = customers.filter(c => {
                const matchesSearch = c.firstName.toLowerCase().includes(searchTerm) ||
                                    c.phone.includes(searchTerm) ||
                                    (c.address && c.address.toLowerCase().includes(searchTerm));
                const matchesFilter = filter === 'all' || c.status === filter;
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: #64748b;">No bookings found</div>';
                return;
            }

            grid.innerHTML = filtered.map(c => `
                <div class="customer-card">
                    <div class="customer-header">
                        <div style="flex: 1;">
                            <div class="customer-title">
                                <h3 class="customer-name">${c.firstName}</h3>
                                <span class="status-badge status-${c.status}">${c.status}</span>
                            </div>
                            <div class="customer-details">
                                <div class="detail-item">
                                    <span class="detail-icon">📞</span>
                                    <span>${c.phone}</span>
                                </div>
                                ${c.email ? `
                                <div class="detail-item">
                                    <span class="detail-icon">📧</span>
                                    <span>${c.email}</span>
                                </div>
                                ` : ''}
                                ${c.location ? `
                                <div class="detail-item">
                                    <span class="detail-icon">📍</span>
                                    <span>${c.location}</span>
                                </div>
                                ` : ''}
                                ${c.address ? `
                                <div class="detail-item">
                                    <span class="detail-icon">🏠</span>
                                    <span>${c.address}</span>
                                </div>
                                ` : ''}
                                <div class="detail-item">
                                    <span class="detail-icon">${service === 'carwash' ? '🚗' : '🗑️'}</span>
                                    <span>${c.service || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-icon">📅</span>
                                    <span>Appointment: ${formatDateTime(c.appointmentDateTime)}</span>
                                </div>
                                ${c.notes ? `
                                <div class="detail-item">
                                    <span class="detail-icon">📝</span>
                                    <span>${c.notes}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="customer-actions">
                            ${c.status === 'active' ? `
                            <button class="btn btn-complete" onclick="markComplete('${service}', ${c.id})" title="Mark as Complete">✓ Complete</button>
                            ` : ''}
                            <button class="icon-btn" onclick="editCustomer('${service}', ${c.id})" title="Edit">✏️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            editingCustomerId = null;
            document.getElementById('modalTitle').textContent = 'Add Booking';
            document.getElementById('customerForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('serviceType').value = currentTab;
            
            if (currentTab === 'carwash') {
                document.getElementById('carwashFields').style.display = 'block';
                document.getElementById('trashcanFields').style.display = 'none';
            } else {
                document.getElementById('carwashFields').style.display = 'none';
                document.getElementById('trashcanFields').style.display = 'block';
            }
            
            document.getElementById('customerModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customerModal').classList.remove('show');
        }

        function editCustomer(service, id) {
            const customers = service === 'carwash' ? carwashCustomers : trashcanCustomers;
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            editingCustomerId = id;
            document.getElementById('modalTitle').textContent = 'Edit Booking';
            document.getElementById('serviceType').value = service;
            document.getElementById('firstName').value = customer.firstName;
            document.getElementById('phone').value = customer.phone;
            document.getElementById('email').value = customer.email || '';
            document.getElementById('status').value = customer.status;
            document.getElementById('notes').value = customer.notes || '';

            if (service === 'carwash') {
                document.getElementById('carwashFields').style.display = 'block';
                document.getElementById('trashcanFields').style.display = 'none';
                document.getElementById('location').value = customer.location || '';
                document.getElementById('crmAddress').value = customer.address || '';
                toggleAddressField();
                document.getElementById('carwashService').value = customer.service || '';
                document.getElementById('carwashDateTime').value = customer.appointmentDateTime || '';
            } else {
                document.getElementById('carwashFields').style.display = 'none';
                document.getElementById('trashcanFields').style.display = 'block';
                document.getElementById('trashcanAddress').value = customer.address || '';
                document.getElementById('trashcanService').value = customer.service || '';
                document.getElementById('trashcanDateTime').value = customer.appointmentDateTime || '';
            }

            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('customerModal').classList.add('show');
        }

        function saveCustomer(event) {
            event.preventDefault();
            
            const service = document.getElementById('serviceType').value;
            const customerData = {
                firstName: document.getElementById('firstName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };

            if (service === 'carwash') {
                customerData.location = document.getElementById('location').value;
                customerData.address = document.getElementById('crmAddress').value;
                customerData.service = document.getElementById('carwashService').value;
                customerData.appointmentDateTime = document.getElementById('carwashDateTime').value;
            } else {
                customerData.address = document.getElementById('trashcanAddress').value;
                customerData.service = document.getElementById('trashcanService').value;
                customerData.appointmentDateTime = document.getElementById('trashcanDateTime').value;
            }

            const customers = service === 'carwash' ? carwashCustomers : trashcanCustomers;

            if (editingCustomerId) {
                const index = customers.findIndex(c => c.id === editingCustomerId);
                customers[index] = { ...customers[index], ...customerData };
            } else {
                customerData.id = Date.now();
                customers.push(customerData);
            }

            saveData();
            renderAll();
            closeModal();
        }

        function deleteCustomer() {
            if (!confirm('Are you sure you want to delete this booking?')) return;
            
            const service = document.getElementById('serviceType').value;
            if (service === 'carwash') {
                carwashCustomers = carwashCustomers.filter(c => c.id !== editingCustomerId);
            } else {
                trashcanCustomers = trashcanCustomers.filter(c => c.id !== editingCustomerId);
            }

            saveData();
            renderAll();
            closeModal();
        }

        init();
    </script>
</body>
</html>
