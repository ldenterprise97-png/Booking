<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.125rem;
        }

        .options {
            display: grid;
            gap: 1.5rem;
        }

        .option-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 1rem;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .option-card:hover {
            border-color: #3b82f6;
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }

        .option-icon {
            font-size: 3.5rem;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
        }

        .option-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }

        .option-description {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .option-arrow {
            font-size: 1.5rem;
            color: #3b82f6;
            flex-shrink: 0;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .option-card {
                padding: 1.5rem;
            }

            .option-icon {
                font-size: 2.5rem;
            }

            .option-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✨</div>
            <h1>Select a Service</h1>
            <p class="subtitle">Choose what you'd like to book</p>
        </div>

        <div class="options">
            <a href="car-wash-booking.html" class="option-card">
                <div class="option-icon">🚗💧</div>
                <div class="option-content">
                    <div class="option-title">Car Detail Booking</div>
                    <div class="option-description">Professional car wash and detailing service</div>
                </div>
                <div class="option-arrow">→</div>
            </a>

            <a href="trash-can-booking.html" class="option-card">
                <div class="option-icon">🗑️✨</div>
                <div class="option-content">
                    <div class="option-title">Trash Can Cleaning</div>
                    <div class="option-description">Professional trash can cleaning service</div>
                </div>
                <div class="option-arrow">→</div>
            </a>
        </div>
    </div>
</body>
</html>
